# ~/.tmux.conf — managed by Home Manager (symlinked via home.file)

# Use Ctrl-a as prefix (screen-style) in addition to Ctrl-b
set -g prefix C-a
bind C-a send-prefix

# Sane defaults
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 50000
set -sg escape-time 10
set -g renumber-windows on

# 256-color / truecolor
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Split panes with | and - (and keep current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config with prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Simple status bar
set -g status-style bg=colour235,fg=colour136
set -g status-left "#[fg=green]#S "
set -g status-right "#[fg=cyan]%Y-%m-%d %H:%M "

# --- plugins (installed via Home Manager; loaded with run-shell) -----------
# Set each plugin's options BEFORE its run-shell line.

# sensible: a handful of universally-agreed defaults.
run-shell ~/.nix-profile/share/tmux-plugins/sensible/sensible.tmux

